<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" fill="none">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Outfit:wght@700;900&amp;display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 900px;
          height: 300px;
          background: #0a0a0f;
          display: flex;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow: hidden;
        }

        /* Grid background */
        .grid {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image:
            linear-gradient(rgba(0,255,213,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,255,213,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        /* Animated gradient line */
        .line-top {
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent, #00ffd5, #7b61ff, #ff2d75, transparent);
          animation: scanX 3s ease-in-out infinite;
        }
        .line-bottom {
          position: absolute;
          bottom: 0; left: 0;
          width: 100%; height: 2px;
          background: linear-gradient(90deg, transparent, #ff2d75, #7b61ff, #00ffd5, transparent);
          animation: scanX 3s ease-in-out infinite reverse;
        }

        @keyframes scanX {
          0%, 100% { opacity: 0.3; transform: scaleX(0.5); }
          50% { opacity: 1; transform: scaleX(1); }
        }

        /* Floating orbs */
        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(40px);
          opacity: 0.15;
          animation: float 6s ease-in-out infinite;
        }
        .orb-1 {
          width: 200px; height: 200px;
          background: #00ffd5;
          top: -50px; left: 100px;
          animation-delay: 0s;
        }
        .orb-2 {
          width: 150px; height: 150px;
          background: #ff2d75;
          bottom: -40px; right: 150px;
          animation-delay: -2s;
        }
        .orb-3 {
          width: 120px; height: 120px;
          background: #7b61ff;
          top: 50px; right: 80px;
          animation-delay: -4s;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0) scale(1); }
          50% { transform: translateY(-20px) scale(1.1); }
        }

        /* Content */
        .content {
          position: relative;
          z-index: 2;
          text-align: center;
        }

        .greeting {
          font-family: 'JetBrains Mono', monospace;
          font-size: 14px;
          color: #00ffd5;
          letter-spacing: 4px;
          text-transform: uppercase;
          margin-bottom: 12px;
          animation: fadeIn 1s ease 0.3s both;
        }

        .name {
          font-family: 'Outfit', sans-serif;
          font-size: 42px;
          font-weight: 900;
          color: #ffffff;
          letter-spacing: -1px;
          margin-bottom: 8px;
          animation: slideUp 0.8s ease 0.5s both;
        }

        .title {
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          color: #888;
          letter-spacing: 2px;
          animation: fadeIn 1s ease 0.8s both;
        }

        .title span {
          color: #00ffd5;
        }

        .badges {
          margin-top: 16px;
          display: flex;
          gap: 8px;
          justify-content: center;
          animation: fadeIn 1s ease 1.1s both;
        }

        .badge {
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          padding: 4px 12px;
          border-radius: 20px;
          border: 1px solid;
        }
        .badge-1 { color: #00ffd5; border-color: #00ffd533; background: #00ffd510; }
        .badge-2 { color: #ff2d75; border-color: #ff2d7533; background: #ff2d7510; }
        .badge-3 { color: #7b61ff; border-color: #7b61ff33; background: #7b61ff10; }

        /* Decorative corners */
        .corner {
          position: absolute;
          width: 20px; height: 20px;
          border-color: #00ffd544;
          border-style: solid;
        }
        .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        /* Status dot */
        .status {
          position: absolute;
          top: 20px; right: 40px;
          display: flex;
          align-items: center;
          gap: 6px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 10px;
          color: #666;
          animation: fadeIn 1s ease 1.4s both;
        }
        .status-dot {
          width: 6px; height: 6px;
          border-radius: 50%;
          background: #00ffd5;
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; box-shadow: 0 0 4px #00ffd5; }
          50% { opacity: 0.4; box-shadow: 0 0 8px #00ffd5; }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>

      <div class="container">
        <div class="grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="line-top"></div>
        <div class="line-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="status">
          <div class="status-dot"></div>
          open to opportunities
        </div>

        <div class="content">
          <div class="greeting">// Hello World</div>
          <div class="name">Mohammed Ahnaf Tajwar</div>
          <div class="title">
            <span>AI/ML Engineer</span> · LLM Systems · Agentic AI
          </div>
          <div class="badges">
            <span class="badge badge-1">MS AI @ Northeastern</span>
            <span class="badge badge-2">Former SWE</span>
            <span class="badge badge-3">Building Agents</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
